<!DOCTYPE html>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}input[type=number]{-moz-appearance:textfield}
body{min-height:100vh;background:linear-gradient(160deg,#0f0e0a,#161510 40%,#1a1710);font-family:'DM Sans',sans-serif;color:#e8dcc8}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hdr{background:linear-gradient(135deg,#1c1a14,#252218);border-bottom:1px solid #2a2820;padding:28px 32px}
.hdr-in{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.logo{display:flex;align-items:center;gap:14px}
.logo-i{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#c9a84c,#a07c2a);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px rgba(201,168,76,.25)}
.logo-t{font-size:26px;font-family:'Playfair Display',serif;font-weight:800;background:linear-gradient(135deg,#e8d5a3,#c9a84c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-s{font-size:12px;color:#6b6554;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.stats{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
.st-b{text-align:center}.st-l{font-size:10px;color:#6b6554;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.st-v{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace}.st-d{width:1px;height:32px;background:#2a2820}
.ldot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.ldot.ok{background:#4ade80;box-shadow:0 0 6px #4ade80}.ldot.ld{background:#facc15;box-shadow:0 0 6px #facc15;animation:pulse 1.5s infinite}.ldot.er{background:#f87171;box-shadow:0 0 6px #f87171}
.lt{font-size:9px;color:#4a4536;margin-top:2px}
.ctn{max-width:1400px;margin:0 auto;padding:20px 32px 0}.ctt{max-width:1400px;margin:20px auto 40px;padding:0 32px}
.tb{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.tg{display:flex;gap:4px;background:#1c1b17;border-radius:10px;padding:3px;border:1px solid #2a2820;flex-wrap:wrap}

.tbtn.ac{background:linear-gradient(135deg,#c9a84c,#a07c2a);color:#0f0e0a}.tbtn.in{background:transparent;color:#7a6f5a}
.tbtn.ia{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff}.tbtn.ra{background:linear-gradient(135deg,#f87171,#dc2626);color:#fff}

.sc{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:#6b6554;cursor:pointer;padding:2px;display:flex}
.abs{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.bex{display:flex;align-items:center;gap:6px;padding:10px 14px;border-radius:10px;border:1px solid #2a2820;background:#1c1b17;color:#7a6f5a;font-size:12px;font-weight:700;cursor:pointer}.bex.op{border-color:#3d3826;background:#1e1c16;color:#c9a84c}
.bpr{display:flex;align-items:center;gap:6px;padding:10px 14px;border-radius:10px;border:none;background:linear-gradient(135deg,#c9a84c,#a07c2a);color:#0f0e0a;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(201,168,76,.3)}.bpr.cx{background:#2a2820;color:#a08c5a;box-shadow:none}
.pnl{background:linear-gradient(135deg,#1e1c16,#1a1812);border:1px solid #3d3826;border-radius:14px;padding:24px;animation:slideDown .3s ease;margin-top:16px}
.pt{font-size:14px;font-weight:700;color:#c9a84c;margin-bottom:16px}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}
.fl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#a08c5a;margin-bottom:4px;display:block}
.fi{width:100%;padding:8px 10px;background:#1c1b17;border:1px solid #3d3826;border-radius:8px;color:#e8dcc8;font-size:13px;font-family:'JetBrains Mono',monospace;outline:none}.fi:focus{border-color:#c9a84c}.fi:disabled{background:#1a1a18;border-color:#2a2820;color:#6b6554}.fi.px{padding-left:22px}.fi.sx{padding-right:36px}
.fw{position:relative;display:flex;flex-direction:column;gap:4px}
.fp{position:absolute;left:10px;bottom:9px;color:#a08c5a;font-size:13px;font-weight:600;pointer-events:none}

.fsel{width:100%;padding:8px 28px 8px 10px;background:#1c1b17;border:1px solid #3d3826;border-radius:8px;color:#e8dcc8;font-size:13px;font-family:'JetBrains Mono',monospace;outline:none;appearance:none;cursor:pointer}.fsel:focus{border-color:#c9a84c}
.badd{padding:10px 28px;border-radius:10px;border:none;background:linear-gradient(135deg,#c9a84c,#a07c2a);color:#0f0e0a;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 4px 16px rgba(201,168,76,.3)}.badd:disabled{background:#2a2820;color:#6b6554;box-shadow:none;cursor:default}
.es{text-align:center;padding:64px 20px;color:#5a5243;border-radius:14px;border:1px dashed #2a2820;background:#141310}.es-i{font-size:40px;margin-bottom:12px;opacity:.4}.es-t{font-size:15px;font-weight:600}.es-s{font-size:12px;margin-top:4px;color:#3d3826}
.bb{display:flex;align-items:center;gap:10px;padding:10px 16px;margin-bottom:8px;background:linear-gradient(135deg,#1e1c16,#1a1812);border:1px solid #3d3826;border-radius:10px;animation:slideDown .2s ease;flex-wrap:wrap}
.bc{font-size:13px;font-weight:700;color:#c9a84c}.bd{width:1px;height:20px;background:#2a2820}
.bbtn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer}
.bbtn.ba{border:1px solid #3d3826;background:#1c1b17;color:#a08c5a}.bbtn.bdl{border:1px solid #991b1b;background:#7f1d1d;color:#f87171}
.bbtn.bcl{border:1px solid #2a2820;background:#1c1b17;color:#6b6554}.bbtn.biv{border:1px solid #2563eb;background:#1e3a5f;color:#93c5fd}.bbtn.brf{border:1px solid #991b1b;background:#451a1a;color:#fca5a5}
.tw{background:#141310;border-radius:14px;border:1px solid #2a2820;overflow:hidden}.tsx{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:1200px}thead tr{background:#1a1812}
th{padding:10px 12px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7a6f5a;text-align:left;border-bottom:1px solid #2a2820;white-space:nowrap;cursor:pointer;user-select:none}th.at{color:#c9a84c}th.cb{width:36px;padding:10px 8px 10px 14px;cursor:default}th.ns{cursor:default}
td{padding:10px 12px}td.cb{padding:10px 8px 10px 14px;width:36px}tbody tr{border-bottom:1px solid #1e1c16;transition:background .2s}tbody tr:hover{background:#18170f}tbody tr.ed{background:#1e1c14}
.mn{font-family:'JetBrains Mono',monospace;font-size:12px}
.co{font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;color:#e8dcc8}.cd{font-size:12px;color:#a09880}
.cp{color:#4ade80;font-weight:700}.cmm{color:#f87171;font-weight:700}.cz{color:#6b6554}.c9{color:#a08c5a}.ct{color:#8a7f6a}
.cn{font-size:12px;color:#8a7f6a;max-width:150px;display:inline-block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ii{padding:5px 8px;background:#1c1b17;border:1px solid #3d3826;border-radius:6px;color:#e8dcc8;font-size:12px;font-family:'JetBrains Mono',monospace;outline:none}.ii:focus{border-color:#c9a84c}
.isel{padding:5px 8px;background:#1c1b17;border:1px solid #3d3826;border-radius:6px;color:#e8dcc8;font-size:12px;font-family:'JetBrains Mono',monospace;outline:none;appearance:none}
.rb{padding:6px 10px;border-radius:7px;border:1px solid #2a2820;background:#1c1b17;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600}
.rb.re{color:#a08c5a}.rb.ra{color:#7a6f5a}.rb.rr{color:#60a5fa}.rb.rs{border-color:#166534;background:#14532d;color:#4ade80;font-weight:700}.rb.rx{color:#7a6f5a;font-weight:700}
.sbg{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
input[type="checkbox"]{accent-color:#c9a84c;cursor:pointer;width:15px;height:15px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:9999;animation:fadeIn .15s ease}
.mx{background:linear-gradient(135deg,#1e1c16,#1a1812);border:1px solid #3d3826;border-radius:14px;padding:28px 32px;max-width:560px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.mmsg{margin:0 0 20px;font-size:14px;color:#e8dcc8;line-height:1.6}.mact{display:flex;gap:8px;justify-content:flex-end}
.mok{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:linear-gradient(135deg,#c9a84c,#a07c2a);color:#0f0e0a}
.mcn{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid #2a2820;background:#1c1b17;color:#7a6f5a}
.mdl{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid #991b1b;background:#7f1d1d;color:#f87171}
.mrf{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:linear-gradient(135deg,#f87171,#dc2626);color:#fff}
.sp2{grid-column:span 2}
.isp{background:#713f12;color:#facc15;border:1px solid #854d0e}
.ispd{background:#14532d;color:#4ade80;border:1px solid #166534}
.isrp{background:#7f1d1d;color:#f87171;border:1px solid #991b1b}
.isrr{background:#14532d;color:#4ade80;border:1px solid #166534}
.dr{font-size:12px;color:#a09880;padding:6px 0;display:flex;justify-content:space-between;border-bottom:1px solid #1e1c16}.dr:last-child{border-bottom:none}
.rr{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #1e1c16;font-size:12px}.rr:last-child{border-bottom:none}
.hidden{display:none}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══ CONSTANTS ═══
const KP={"9K":.375,"10K":.4167,"12K":.5,"14K":.5833,"18K":.75,"22K":.9167,"24K":1},KO=Object.keys(KP);
const SO=["","Ok","Under Weight","Under Karat","Not Gold","Refunded"],TOZ=31.1035;
const SC={"":{b:"transparent",t:"#6b6554",r:"#2a2820"},"Ok":{b:"#14532d",t:"#4ade80",r:"#166534"},"Under Weight":{b:"#713f12",t:"#facc15",r:"#854d0e"},"Under Karat":{b:"#7c2d12",t:"#fb923c",r:"#9a3412"},"Not Gold":{b:"#7f1d1d",t:"#f87171",r:"#991b1b"},"Refunded":{b:"#312e81",t:"#a5b4fc",r:"#3730a3"}};
const I={plus:'<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>',arc:'<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4"/></svg>',res:'<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 1 2.636 6.364"/><path d="M3 21v-5h5"/></svg>',edt:'<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',sav:'<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>',can:'<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',sea:'<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',exp:'<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',tra:'<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>',inv:'<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',ref:'<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>',chk:'<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'};

// ═══ STATE ═══
let recs=JSON.parse(localStorage.getItem('gr2')||'[]');
let invs=JSON.parse(localStorage.getItem('gi2')||'[]');
let refs=JSON.parse(localStorage.getItem('grf2')||'[]');
let vm='active',showForm=false,showExport=false,eid=null,eb=null,sel=new Set(),sq='',sof='dp',sod='desc';
let ef='',et='',es='active',modal=null;
let nin=parseInt(localStorage.getItem('gni2')||'1000');
let nr={on:'',dp:'',dr:'',sp:'',g:'',k:'10K',pp:'',tn:'',st:'',nt:''};

// ═══ HELPERS ═══
function sv(){localStorage.setItem('gr2',JSON.stringify(recs));localStorage.setItem('gi2',JSON.stringify(invs));localStorage.setItem('grf2',JSON.stringify(refs));localStorage.setItem('gni2',String(nin))}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function td(){return new Date().toISOString().split('T')[0]}
function net(){return new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:'America/New_York'})}
function $(v){var n=parseFloat(v);return isNaN(n)?'$0.00':'$'+n.toFixed(2)}
function c90(s,g,k,p){var sp=parseFloat(s),gr=parseFloat(g),pu=parseFloat(p),py=KP[k]||1;if(isNaN(sp)||isNaN(gr)||isNaN(pu))return{np:'',cm:''};var n=(sp/TOZ)*py*gr*.9;return{np:n.toFixed(2),cm:(n-pu).toFixed(2)}}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function badge(s){if(!s)return'<span style="color:#6b6554;font-size:12px">—</span>';var c=SC[s]||SC[''];return '<span class="sbg" style="background:'+c.b+';color:'+c.t+';border:1px solid '+c.r+'">'+s+'</span>'}

// ═══ FILTER / SORT ═══
function gfilt(){return recs.filter(function(r){if(vm==='active'?r.ar:!r.ar)return false;if(!sq.trim())return true;var q=sq.toLowerCase();return[r.on,r.dp,r.dr,r.sp,r.g,r.k,r.pp,r.np,r.cm,r.tn,r.st,r.nt].some(function(v){return(v||'').toString().toLowerCase().indexOf(q)>=0})})}
function gsort(f){return f.slice().sort(function(a,b){var av=a[sof]||'',bv=b[sof]||'';if('sp g pp np cm'.indexOf(sof)>=0){av=parseFloat(av)||0;bv=parseFloat(bv)||0}return av<bv?(sod==='asc'?-1:1):av>bv?(sod==='asc'?1:-1):0})}

// ═══ ONLY UPDATE CALC FIELDS (90% and commission) — no re-render ═══
function updateCalcFields(){
  var sp=document.getElementById('nr-sp'),gr=document.getElementById('nr-g'),pp=document.getElementById('nr-pp'),kk=document.getElementById('nr-k');
  if(!sp)return;
  var c=c90(sp.value,gr.value,kk.value,pp.value);
  var el90=document.getElementById('nr-90'),elCm=document.getElementById('nr-cm');
  if(el90)el90.value=c.np?$(c.np):'—';
  if(elCm)elCm.value=c.cm?$(c.cm):'—';
}

// ═══ CRUD ═══
function addRec(){
  var on=document.getElementById('nr-on').value.trim();
  if(!on)return;
  var sp=document.getElementById('nr-sp').value;
  var g=document.getElementById('nr-g').value;
  var k=document.getElementById('nr-k').value;
  var pp=document.getElementById('nr-pp').value;
  var c=c90(sp,g,k,pp);
  recs.push({id:gid(),on:on,dp:document.getElementById('nr-dp').value||td(),dr:document.getElementById('nr-dr').value||'',sp:sp,g:g,k:k,pp:pp,np:c.np,cm:c.cm,tn:document.getElementById('nr-tn').value,st:document.getElementById('nr-st').value,nt:document.getElementById('nr-nt').value,ar:false,ii:null,ri:null,ts:net()});
  sv();showForm=false;R();
}
function stEdit(id){eid=id;eb=Object.assign({},recs.find(function(r){return r.id===id}));R()}
function cEdit(){eid=null;eb=null;R()}
function svEdit(){
  var row=document.querySelector('tr[data-id="'+eid+'"]');
  if(row){
    var inputs=row.querySelectorAll('[data-field]');
    inputs.forEach(function(inp){eb[inp.dataset.field]=inp.value});
  }
  var c=c90(eb.sp,eb.g,eb.k,eb.pp);
  var orig=recs.find(function(r){return r.id===eid});
  recs=recs.map(function(r){return r.id===eid?Object.assign({},eb,{np:c.np,cm:c.cm,ts:orig?orig.ts:''}):r});
  sv();eid=null;eb=null;R();
}
// Auto-save a single field on a record without full re-render
function inlineSave(id,field,val){
  var rec=recs.find(function(r){return r.id===id});
  if(!rec)return;
  rec[field]=val;
  // Recalc 90% and commission
  var c=c90(rec.sp,rec.g,rec.k,rec.pp);
  rec.np=c.np;rec.cm=c.cm;
  sv();
  // Update the 90% and commission cells in this row without re-render
  var row=document.querySelector('tr[data-id="'+id+'"]');
  if(row){
    var el90=row.querySelector('[data-cell="np"]');
    var elCm=row.querySelector('[data-cell="cm"]');
    if(el90)el90.innerHTML=c.np?$(c.np):'—';
    if(elCm){var cv=parseFloat(c.cm);elCm.className='mn '+((!isNaN(cv)&&cv!==0)?(cv>=0?'cp':'cmm'):'cz');elCm.innerHTML=c.cm?$(c.cm):'—'}
  }
}
function tArc(id){var r=recs.find(function(x){return x.id===id});if(r&&!r.ar&&!r.dr){modal={msg:'Cannot archive: no Received Date.'};showModal();return}recs=recs.map(function(x){return x.id===id?Object.assign({},x,{ar:!x.ar}):x});sv();if(eid===id){eid=null;eb=null}R()}
function tSel(id){sel.has(id)?sel.delete(id):sel.add(id);R()}
function tSelAll(){
  var so=gsort(gfilt());
  var ids=so.map(function(r){return r.id});
  var allSel=ids.length>0&&ids.every(function(id){return sel.has(id)});
  ids.forEach(function(id){allSel?sel.delete(id):sel.add(id)});R();

      h+='<td style="position:relative"><div style="display:flex;align-items:center;gap:4px">';
      h+='<input class="ii" style="width:110px" value="'+esc(d.nt)+'" onclick="openNotes(\''+rid+'\')" onfocus="openNotes(\''+rid+'\')" readonly placeholder="Click to edit...">';
      h+='<span style="cursor:pointer;color:#6b6554;font-size:14px;line-height:1" onclick="openNotes(\''+rid+'\')" title="Expand notes">⤢</span>';
      h+='</div></td>';
      
      h+='<td style="text-align:right"><button class="rb '+(rec.ar?'rr':'ra')+'" onclick="tArc(\''+rid+'\')">'+(rec.ar?I.res:I.arc)+'</button></td>';
      h+='</tr>';
    });
    h+='</tbody></table></div></div>';
  }
  h+='</div>';
}

// Modals
if(modal){
  if(modal.type==='refund'){
    var sr=modal.rcs;
    h+='<div class="mo"><div class="mx" onclick="event.stopPropagation()">';
    h+='<div style="font-size:16px;font-weight:700;color:#f87171;margin-bottom:16px">Create Refund / Chargeback</div>';
    h+='<p style="font-size:12px;color:#6b6554;margin-bottom:12px">Enter refund amount per record:</p>';
    h+='<div style="max-height:300px;overflow-y:auto;margin-bottom:16px">';
    sr.forEach(function(r){
      h+='<div class="rr"><span style="flex:1;color:#e8dcc8;font-family:JetBrains Mono,monospace;font-size:12px">'+esc(r.on)+'</span><span style="color:#6b6554;font-size:11px">Comm: '+$(r.cm)+'</span><div style="position:relative;display:flex;align-items:center"><span style="position:absolute;left:8px;color:#a08c5a;font-size:12px;pointer-events:none">$</span><input type="number" step="any" class="ii" id="ref-'+r.id+'" style="width:100px;padding-left:20px" value="'+(modal.amts[r.id]||'')+'"></div></div>';
    });
    h+='</div><div style="display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid #2a2820">';
    h+='<span style="font-size:14px;font-weight:700;color:#f87171;font-family:JetBrains Mono,monospace">Refund Total</span>';
    h+='<div class="mact"><button class="mcn" onclick="closeModal()">Cancel</button><button class="mrf" onclick="cRef()">Create Refund</button></div></div></div></div>';
  }else if(modal.type==='inv-detail'){
    var iv=modal.inv;
    var irs=iv.items?iv.items:iv.rids.map(function(id){return recs.find(function(r){return r.id===id})}).filter(Boolean);
    h+='<div class="mo" onclick="closeModal()"><div class="mx" onclick="event.stopPropagation()">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span style="font-size:18px;font-weight:700;color:#93c5fd;font-family:Playfair Display,serif">Invoice #'+iv.num+'</span><span class="sbg '+(iv.st==='Paid'?'ispd':'isp')+'">'+iv.st+'</span></div>';
    h+='<div style="font-size:12px;color:#6b6554;margin-bottom:12px">Created: '+iv.dt+' at '+iv.ts+(iv.pd?' · Paid: '+iv.pd:'')+'</div>';
    h+='<div style="max-height:300px;overflow-y:auto">';
    irs.forEach(function(r){h+='<div class="dr"><span style="color:#6b6554">'+esc(r.on)+' — '+r.k+' '+r.g+'g</span><span class="mn" style="color:#e8dcc8">'+$(r.cm)+'</span></div>'});
    h+='</div><div style="display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid #2a2820;margin-top:12px"><span class="mn cp" style="font-size:16px">Total: '+$(iv.tc)+'</span><button class="mok" onclick="closeModal()">Close</button></div></div></div>';
  }else if(modal.type==='ref-detail'){
    var rf=modal.ref;
    h+='<div class="mo" onclick="closeModal()"><div class="mx" onclick="event.stopPropagation()">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span style="font-size:18px;font-weight:700;color:#fca5a5;font-family:Playfair Display,serif">Refund Details</span><span class="sbg '+(rf.st==='Resolved'?'isrr':'isrp')+'">'+rf.st+'</span></div>';
    h+='<div style="font-size:12px;color:#6b6554;margin-bottom:12px">Created: '+rf.dt+' at '+rf.ts+(rf.rd?' · Resolved: '+rf.rd:'')+'</div>';
    h+='<div style="max-height:300px;overflow-y:auto">';
    rf.items.forEach(function(it){h+='<div class="dr"><span style="color:#6b6554">'+esc(it.on)+'</span><span class="mn" style="color:#f87171">'+$(it.amt)+'</span></div>'});
    h+='</div><div style="display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid #2a2820;margin-top:12px"><span class="mn cmm" style="font-size:16px">Total: '+$(rf.tot)+'</span><button class="mok" onclick="closeModal()">Close</button></div></div></div>';
  }else if(modal.type==='notes'){
    h+='<div class="mo" onclick="saveNotes()"><div class="mx" onclick="event.stopPropagation()" style="max-width:480px">';
    h+='<div style="font-size:14px;font-weight:700;color:#c9a84c;margin-bottom:12px">Notes — '+esc(modal.on)+'</div>';
    h+='<textarea id="notes-ta" style="width:100%;min-height:180px;padding:12px;background:#1c1b17;border:1px solid #3d3826;border-radius:8px;color:#e8dcc8;font-size:13px;font-family:\'DM Sans\',sans-serif;outline:none;resize:vertical;line-height:1.6">'+esc(modal.val)+'</textarea>';
    h+='<div class="mact" style="margin-top:12px"><button class="mcn" onclick="modal=null;R()">Cancel</button><button class="mok" onclick="saveNotes()">Save</button></div></div></div>';
  }else{
    h+='<div class="mo" onclick="closeModal()"><div class="mx" onclick="event.stopPropagation()"><p class="mmsg">'+modal.msg+'</p><div class="mact">';
    if(modal.onConfirm)h+='<button class="mcn" onclick="closeModal()">Cancel</button><button class="mdl" onclick="modal.onConfirm()">Delete</button>';
    else h+='<button class="mok" onclick="closeModal()">OK</button>';
    h+='</div></div></div>';
  }
}

var activeId=document.activeElement?document.activeElement.id:'';
var cursorPos=-1;
if(activeId&&document.activeElement.selectionStart!==undefined){cursorPos=document.activeElement.selectionStart}

document.getElementById('app').innerHTML=h;

if(activeId){
  var el=document.getElementById(activeId);
  if(el){el.focus();if(cursorPos>=0&&el.setSelectionRange){try{el.setSelectionRange(cursorPos,cursorPos)}catch(e){}}}
}

if(showForm)setTimeout(updateCalcFields,0);
}

R();
</script>
</body>
</html>
