"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',ref:'<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>',chk:'<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'};

// ═══ STATE ═══

  db.collection("records").onSnapshot(s => { recs = s.docs.map(d => ({id:d.id, ...d.data()})); R(); });

  db.collection("refunds").onSnapshot(s => { refs = s.docs.map(d => ({id:d.id, ...d.data()})); R(); });
}

// ═══ HELPERS ═══
function sv(){ localStorage.setItem('gni2',String(nin)); }
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

function net(){return new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:'America/New_York'})}

function c90(s,g,k,p){var sp=parseFloat(s),gr=parseFloat(g),pu=parseFloat(p),py=KP[k]||1;if(isNaN(sp)||isNaN(gr)||isNaN(pu))return{np:'',cm:''};var n=(sp/TOZ)*py*gr*.9;return{np:n.toFixed(2),cm:(n-pu).toFixed(2)}}

function gfilt(){return recs.filter(function(r){if(vm==='active'?r.ar:!r.ar)return false;if(!sq.trim())return true;var q=sq.toLowerCase();return[r.on,r.dp,r.dr,r.sp,r.g,r.k,r.pp,r.np,r.cm,r.tn,r.st,r.nt].some(function(v){return(v||'').toString().toLowerCase().indexOf(q)>=0})})}
function gsort(f){return f.slice().sort(function(a,b){var av=a[sof]||'',bv=b[sof]||'';if('sp g pp np cm'.indexOf(sof)>=0){av=parseFloat(av)||0;bv=parseFloat(bv)||0}return av<bv?(sod==='asc'?-1:1):av>bv?(sod==='asc'?1:-1):0})}
